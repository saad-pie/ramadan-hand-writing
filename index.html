<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ramadan Pen | ✨</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <style>
    :root {
      --gold: #F5D061;
      --white: #FFFFFF;
      --deep-oak: #0A0602;
    }
    body { 
      margin: 0; 
      background: #000; 
      overflow: hidden; 
      font-family: 'Inter', -apple-system, sans-serif;
      touch-action: none;
    }
    video { display: none; }
    canvas { 
      width: 100vw; 
      height: 100vh; 
      transform: scaleX(-1); 
      position: absolute; 
      top: 0; left: 0;
    }
    
    .controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 15px;
    }

    button {
      background: rgba(20, 15, 10, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(245, 208, 97, 0.3);
      color: var(--gold);
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    button:active {
      transform: scale(0.95);
      background: var(--gold);
      color: #000;
    }

    .status {
      position: fixed;
      top: 30px;
      width: 100%;
      text-align: center;
      color: var(--gold);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      z-index: 10;
      transition: opacity 0.3s;
      text-shadow: 0 0 10px rgba(245, 208, 97, 0.5);
    }

    .active-pinch {
      color: #fff;
      text-shadow: 0 0 20px #fff;
    }
  </style>
</head>
<body>
  <div id="status" class="status">PINCH INDEX & THUMB TO WRITE</div>
  <video id="vid" playsinline></video>
  <canvas id="c"></canvas>

  <div class="controls">
    <button onclick="clearCanvas()">Reset Canvas</button>
  </div>

  <script>
    const vid = document.getElementById('vid');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const statusText = document.getElementById('status');
    
    let paths = [];
    let currentPath = null;
    let smoothX = null, smoothY = null;
    let particles = [];

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 3 + 1;
        this.speedX = (Math.random() - 0.5) * 2;
        this.speedY = (Math.random() - 0.5) * 2;
        this.life = 1.0;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life -= 0.02;
      }
      draw(context) {
        context.fillStyle = `rgba(245, 208, 97, ${this.life})`;
        context.beginPath();
        context.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        context.fill();
      }
    }

    function clearCanvas() {
      paths = [];
      particles = [];
    }

    function onResults(res) {
      if (c.width !== window.innerWidth) {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
      }

      ctx.save();
      // Mirror the context so we don't have to flip coordinates manually
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.drawImage(res.image, 0, 0, c.width, c.height);
      
      // Ramadan Atmosphere Overlay
      ctx.fillStyle = 'rgba(5, 3, 1, 0.85)';
      ctx.fillRect(0, 0, c.width, c.height);

      // 1. Draw Saved Paths
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#F5D061';
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      paths.forEach(path => {
        if (path.length < 2) return;
        ctx.beginPath();
        ctx.strokeStyle = '#F5D061';
        ctx.lineWidth = 4;
        ctx.moveTo(path[0].x, path[0].y);
        for (let i = 1; i < path.length; i++) {
          ctx.lineTo(path[i].x, path[i].y);
        }
        ctx.stroke();
      });

      // 2. Process Hand Data
      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const landmarks = res.multiHandLandmarks[0];
        const index = landmarks[8];
        const thumb = landmarks[4];
        
        // Mirror coordinate mapping
        const rx = index.x * c.width;
        const ry = index.y * c.height;

        if (smoothX === null) {
          smoothX = rx; smoothY = ry;
        } else {
          smoothX += (rx - smoothX) * 0.4;
          smoothY += (ry - smoothY) * 0.4;
        }

        const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
        const isPinching = dist < 0.045;

        if (isPinching) {
          statusText.innerText = "WRITING...";
          statusText.classList.add('active-pinch');
          
          if (!currentPath) {
            currentPath = [];
            paths.push(currentPath);
          }
          currentPath.push({x: smoothX, y: smoothY});
          
          // Add magic particles
          for(let i=0; i<2; i++) particles.push(new Particle(smoothX, smoothY));
        } else {
          statusText.innerText = "PINCH INDEX & THUMB TO WRITE";
          statusText.classList.remove('active-pinch');
          currentPath = null;
        }

        // Animated Cursor
        ctx.beginPath();
        ctx.arc(smoothX, smoothY, isPinching ? 3 : 10, 0, 2 * Math.PI);
        ctx.strokeStyle = '#F5D061';
        ctx.lineWidth = 2;
        ctx.stroke();
        if(isPinching) {
            ctx.fillStyle = '#fff';
            ctx.fill();
        }
      }

      // 3. Update & Draw Particles
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.update();
        p.draw(ctx);
      });

      ctx.restore();
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1, // Balanced for better tracking
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    const camera = new Camera(vid, {
      onFrame: async () => {
        await hands.send({image: vid});
      },
      width: 1280,
      height: 720
    });
    camera.start();
  </script>
</body>
</html>
